<!DOCTYPE html>
<html lang="en">


<meta http-equiv="content-type" content="text/html;charset=UTF-8" />

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title><%= title %></title>
  <link rel="icon" href="/assets/img/favicon.png" type="image/x-icon">
  <link rel="stylesheet" href="/assets/css/style.css">
</head>

<body id="dark">
  <%- include('../partials/auth-header.html') %>
  <div class="vh-100 d-flex justify-content-center">
    <div class="form-access my-auto">
      <form method="post" action="/auth/signup">
        <span>Create Account</span>
        <div class="form-group">
          <input type="text" name="firstName" id="firstName" class="form-control" placeholder="Your First Name"
            required>
        </div>
        <div class="form-group">
          <input type="text" name="lastName" id="lastName" class="form-control" placeholder="Your Last Name" required>
        </div>
        <hr>
        <div class="form-group">
          <input type="email" name="email" id="email" class="form-control" placeholder="Email Address" required>
        </div>
        <div class="form-group">
          <input type="password" name="password" id="password" class="form-control" placeholder="Password" required>
        </div>
        <div class="form-group">
          <input type="password" name="confirmPassword" id="confirmPassword" class="form-control"
            placeholder="Confirm Password" required>
        </div>
        <div class="form-group">
          <input type="text" name="country" id="country" class="form-control" placeholder="Your Country" required>
        </div>
        <hr>
        <div class="form-group">
          <input type="text" name="phone" id="phone" class="form-control" placeholder="+1 234 567 890" required>
        </div>
        <div class="form-group">
          <select name="currency" id="currency" class="form-control" required>
            <option value="">Preferred Currency</option>
            <option value="USD" selected>USD</option>
            <option value="EUR">EUR</option>
            <option value="GBP">GBP</option>
            <option value="CHF">CHF</option>
          </select>
        </div>
        <div class="custom-control custom-checkbox">
          <input type="checkbox" class="custom-control-input" id="form-checkbox">
          <label class="custom-control-label" for="form-checkbox">I agree to the <a href="#!">Terms &
              Conditions</a></label>
        </div>
        <button type="submit" class="btn btn-primary">Create Account</button>
      </form>
      <h2>Already have an account? <a href='/auth/signin'>Sign in here</a></h2>
    </div>
  </div>

  <script src="/assets/js/jquery-3.4.1.min.js"></script>
  <script src="/assets/js/popper.min.js"></script>
  <script src="/assets/js/bootstrap.min.js"></script>
  <script src="/assets/js/amcharts-core.min.js"></script>
  <script src="/assets/js/amcharts.min.js"></script>
  <script src="/assets/js/custom.js"></script>
</body>


</html>
