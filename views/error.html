<!DOCTYPE html>
<html lang="en">


<meta http-equiv="content-type" content="text/html;charset=UTF-8" />

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title><%= title %></title>
  <link rel="icon" href="<%= mainurl ? mainurl + '/' : './' %>assets/img/favicon.png" type="image/x-icon">
  <link rel="stylesheet" href="<%= mainurl ? mainurl + '/' : './' %>assets/css/style.css">
</head>

<body id="dark">
  <header class="dark-bb">
    <nav class="navbar navbar-expand-lg">
      <a class='navbar-brand' href='/'><img src="<%= mainurl ? mainurl + '/' : './' %>assets/img/logo-light.svg" alt="logo"></a>
    </nav>
  </header>
  <div class="error-page vh-100 d-flex justify-content-center text-center">
    <div class="my-auto">
      <h2>404</h2>
      <p><%= message %></p>
      <span><%= error.status %></span>
      <pre><%= error.stack %></pre>
      <a class='btn' href='/dashboard'>Back to Home <i class="icon ion-md-home"></i></a>
    </div>
  </div>

  <script src="<%= mainurl ? mainurl + '/' : './' %>assets/js/jquery-3.4.1.min.js"></script>
  <script src="<%= mainurl ? mainurl + '/' : './' %>assets/js/popper.min.js"></script>
  <script src="<%= mainurl ? mainurl + '/' : './' %>assets/js/bootstrap.min.js"></script>
  <script src="<%= mainurl ? mainurl + '/' : './' %>assets/js/amcharts-core.min.js"></script>
  <script src="<%= mainurl ? mainurl + '/' : './' %>assets/js/amcharts.min.js"></script>
  <script src="<%= mainurl ? mainurl + '/' : './' %>assets/js/custom.js"></script>
</body>


</html>
